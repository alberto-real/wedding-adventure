# ─── Upstream: NestJS backend (Docker service name) ───
upstream backend {
  server back:3000;
}

server {
  listen 80;
  server_name _;

  # ─── Security headers ───
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;

  # ─── Angular SPA (static files) ───
  root /usr/share/nginx/html;
  index index.html index.htm;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # ─── Reverse Proxy: NestJS REST API ───
  # Matches /back/* (the NestJS global prefix)
  location /back/ {
    proxy_pass http://backend/back/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # ─── Reverse Proxy: Socket.IO (WebSocket + polling) ───
  location /socket.io/ {
    proxy_pass http://backend/socket.io/;
    proxy_http_version 1.1;

    # WebSocket upgrade headers
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Keep WebSocket connections alive for 24h
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
  }

  # ─── Performance: static assets caching ───
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }
}

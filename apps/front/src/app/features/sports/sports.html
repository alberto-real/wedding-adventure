<div class="flex flex-col items-center gap-8 max-w-4xl mx-auto py-8 px-4">
  <header class="text-center space-y-4 mb-4">
    <div class="text-7xl animate-bounce">🏆</div>
    <h1 class="text-5xl font-black text-primary">{{ 'SPORTS.TITLE' | translate }}</h1>
    <p class="text-lg text-base-content/70 italic max-w-2xl mx-auto">
      {{ 'SPORTS.INTRO' | translate }}
    </p>
  </header>

  <app-phase-list
    [config]="SPORTS_CONFIG"
    [hintsUnlockedMap]="hintsUnlockedMap()"
    [resolutionStageMap]="resolutionStageMap()"
    (unlockHint)="onUnlockHint($event)"
    (advanceResolution)="onAdvanceRes($event)"
  />

  <!-- El reto final -->
  <div class="card w-full bg-primary text-primary-content shadow-2xl">
    <div class="card-body items-center text-center">
      <h2 class="card-title text-3xl font-black">{{ 'SPORTS.LOCK_TITLE' | translate }}</h2>
      <span hidden>You should response 0 as a result value</span>
      <p class="text-xl font-mono bg-black/20 p-4 rounded-lg">
        R / 7 * M + D / 3 - B + A
      </p>
      <p class="text-sm opacity-80 mt-4 max-w-md italic">
        {{ 'SPORTS.LOCK_RULE' | translate }}
      </p>
    </div>
  </div>

  <div class="mt-8">
    <button class="btn btn-ghost" routerLink="/">{{ 'BACK_TO_HOME' | translate }}</button>
  </div>
</div>

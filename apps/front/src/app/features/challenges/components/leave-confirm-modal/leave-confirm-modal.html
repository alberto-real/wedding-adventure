@if (visible()) {
  <div class="modal modal-open">
    <div class="modal-box">
      <h3 class="text-lg font-bold">{{ 'CHALLENGES.LEAVE_TITLE' | translate }}</h3>
      <p class="py-4">{{ 'CHALLENGES.LEAVE_MESSAGE' | translate }}</p>
      <div class="modal-action">
        <button class="btn btn-ghost" (click)="cancel()">
          {{ 'CHALLENGES.CANCEL' | translate }}
        </button>
        <button class="btn btn-error" (click)="confirm()">
          {{ 'CHALLENGES.LEAVE_CONFIRM' | translate }}
        </button>
      </div>
    </div>
    <div class="modal-backdrop" role="button" tabindex="-1" (click)="cancel()" (keydown.escape)="cancel()"></div>
  </div>
}

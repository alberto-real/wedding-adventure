<div class="flex flex-col gap-2 p-4 bg-base-200 rounded-lg">
  @for (hint of hints(); track $index) {
    @if (unlockedCount() > $index) {
      <div
        class="alert alert-info py-2 text-sm shadow"
        [class.animate-in]="unlockedCount() === $index + 1"
        [class.slide-in-from-top]="unlockedCount() === $index + 1"
      >
        <span>
          💡 {{ hint.labelKey | translate }}
          @if (hint.url) {
            <a
              [href]="hint.url"
              target="_blank"
              class="link link-primary font-bold"
            >
              {{ hint.urlLabel || hint.url }}
            </a>
          }
        </span>
      </div>
    }
  }

  <div class="flex justify-center mt-2">
    @if (unlockedCount() < hints().length) {
      <button
        class="btn btn-sm btn-outline btn-secondary"
        (click)="unlock.emit()"
      >
        <span>💡</span> {{ labelKey() | translate }}
      </button>
    }
  </div>
</div>

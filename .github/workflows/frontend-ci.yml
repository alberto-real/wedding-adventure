name: Front CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/front/**' # Trigger only on changes in the frontend directory
      - '.github/workflows/frontend-ci.yml' # Also trigger if the workflow itself changes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use the same Node.js version as in Dockerfile

      - name: Install dependencies
        run: npm install --prefix ./

      - name: Build Front
        run: npx nx build front --prod

      - name: Run Front tests
        run: npx nx test front


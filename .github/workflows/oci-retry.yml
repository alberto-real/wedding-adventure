name: OCI VM Retry

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

env:
  OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"
  SUPPRESS_LABEL_WARNING: "True"

jobs:
  retry-create-vm:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ secrets.OCI_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=eu-madrid-1\nkey_file=~/.oci/oci_api_key.pem\n' \
            "${{ secrets.OCI_USER_OCID }}" \
            "${{ secrets.OCI_FINGERPRINT }}" \
            "${{ secrets.OCI_TENANCY_OCID }}" > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Verify OCI CLI works
        run: |
          oci iam region list --query "data[?name=='eu-madrid-1'].name" --raw-output
          echo "OCI CLI is working"

      - name: Check if VM already exists
        id: check
        run: |
          COUNT=$(oci compute instance list \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --lifecycle-state RUNNING \
            --query "length(data)" \
            --raw-output 2>/dev/null || echo "0")
          echo "Running instances: $COUNT"
          if [ "$COUNT" != "0" ] && [ -n "$COUNT" ] && [ "$COUNT" != "None" ]; then
            echo "vm_running=true" >> $GITHUB_OUTPUT
          else
            echo "vm_running=false" >> $GITHUB_OUTPUT
          fi

      - name: Try to apply stack
        if: steps.check.outputs.vm_running == 'false'
        run: |
          echo "No running VMs found. Attempting to create..."
          RAW=$(oci resource-manager job create-apply-job \
            --stack-id "${{ secrets.OCI_STACK_ID }}" \
            --execution-plan-strategy AUTO_APPROVED \
            --query "data.id" --raw-output 2>&1) || true
          JOB_ID=$(echo "$RAW" | grep "^ocid1" | head -1)
          echo "Raw output: $RAW"
          echo "Extracted JOB_ID: $JOB_ID"

          if [[ -n "$JOB_ID" ]]; then
            echo "Job created: $JOB_ID"
            sleep 120
            STATE=$(oci resource-manager job get \
              --job-id "$JOB_ID" \
              --query "data.\"lifecycle-state\"" \
              --raw-output 2>&1 | grep -v "^Warning" | tail -1)
            echo "Job state: $STATE"
          else
            echo "Could not create job. Will retry in 10 minutes."
          fi

      - name: VM already running
        if: steps.check.outputs.vm_running == 'true'
        run: echo "VM already exists. Disabling this workflow would be a good idea."

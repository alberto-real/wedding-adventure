version: '3.8'

# ─── Local Development Docker Compose ───
# For local dev, you'd typically run `npx nx serve front` and `npx nx serve back`
# directly. This compose file is for testing the Docker build locally.
#
# Usage:
#   docker compose up -d --build        (test with current docker-compose.yml)
#   docker compose -f docker-compose.prod.yml up -d --build  (test prod config)

services:
  back:
    build:
      context: .
      dockerfile: apps/back/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development

  front:
    build:
      context: .
      dockerfile: apps/front/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - back
